name: Publicar GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium para E2E
        run: npx playwright install --with-deps chromium

      - name: Validar e montar site
        run: |
          npm run check
          npm run build:static

      - name: Publicar dist no branch gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add pages-deploy origin/gh-pages
          find pages-deploy -mindepth 1 ! -path "pages-deploy/.git" ! -path "pages-deploy/.git/*" -exec rm -rf {} +
          cp -R dist/. pages-deploy/
          touch pages-deploy/.nojekyll
          cd pages-deploy
          git add -A
          git commit -m "Deploy GitHub Pages" || echo "Sem mudancas para publicar."
          git push origin HEAD:gh-pages --force
