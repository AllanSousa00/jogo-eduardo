name: Publicar GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium para E2E
        run: npx playwright install --with-deps chromium

      - name: Validar e montar site
        run: |
          npm run check
          npm run build:static

      - name: Publicar dist no branch gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add pages-deploy origin/gh-pages
          find pages-deploy -mindepth 1 ! -path "pages-deploy/.git" ! -path "pages-deploy/.git/*" -exec rm -rf {} +
          cp -R dist/. pages-deploy/
          cat > pages-deploy/package.json <<'EOF'
          {
            "private": true,
            "scripts": {
              "build:static": "node cloudflare-gh-pages-build.js"
            }
          }
          EOF
          cat > pages-deploy/cloudflare-gh-pages-build.js <<'EOF'
          const fs = require("node:fs");
          const path = require("node:path");

          const root = process.cwd();
          const output = path.join(root, "dist");
          const ignored = new Set([".git", "dist", "package.json", "cloudflare-gh-pages-build.js"]);

          fs.rmSync(output, { recursive: true, force: true });
          fs.mkdirSync(output, { recursive: true });

          fs.readdirSync(root).forEach((entry) => {
            if (ignored.has(entry)) return;
            fs.cpSync(path.join(root, entry), path.join(output, entry), { recursive: true });
          });

          console.log("Cloudflare Pages static output ready in dist.");
          EOF
          touch pages-deploy/.nojekyll
          cd pages-deploy
          git add -A
          git commit -m "Deploy GitHub Pages" || echo "Sem mudancas para publicar."
          git push origin HEAD:gh-pages --force
